services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/assets:/app/assets
    environment:
      - MOCK_MODE=false
      - GEMINI_API_KEY=${GEMINI_API_KEY:-dummy}
      - AGITATION_API_URL=http://raspberrypi.local:8001
      - PYTHONUNBUFFERED=1
    dns:
      - 8.8.8.8
      - 8.8.4.4
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      # node_modules はコンテナ内のものを使う（ホストにマウントしない）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
