services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
    environment:
      - MOCK_MODE=true
      - GEMINI_API_KEY=${GEMINI_API_KEY:-dummy}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      # node_modules はコンテナ内のものを使う（ホストにマウントしない）
    environment:
      - VITE_BACKEND_WS_URL=ws://host.docker.internal:8000/ws/frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
